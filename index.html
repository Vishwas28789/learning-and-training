<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning and Training - Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .projects-grid {
            display: grid;
            gap: 15px;
        }

        .project-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border-top: 4px solid #667eea;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-top-color: #764ba2;
        }

        .project-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #667eea;
        }

        .project-card p {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .project-card .arrow {
            display: inline-block;
            margin-top: 12px;
            color: #764ba2;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .header p {
                font-size: 14px;
            }

            .project-card {
                padding: 20px;
            }

            .project-card h3 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Learning & Training</h1>
            <p>Practice projects and learning materials</p>
        </div>

        <div class="projects-grid">
            <a href="./simple form/index.html" class="project-card">
                <h3>Simple Login Form</h3>
                <p>Learn HTML, CSS, and JavaScript with user authentication, ASCII encryption, and role-based access.</p>
                <span class="arrow">→ Open Project</span>
            </a>
        </div>
    </div>
</body>
</html>
